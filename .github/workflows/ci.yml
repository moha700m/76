name: Quality gate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run check
      - name: Reject committed environment files
        run: |
          if git ls-files | grep -E '(^|/)(\.env($|\.)|credentials|secrets)' ; then
            echo "Sensitive file name detected"
            exit 1
          fi

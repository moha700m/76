name: Daily AppDeploy backup

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Export AppDeploy data
        env:
          APPDEPLOY_BACKUP_ENDPOINT: ${{ secrets.APPDEPLOY_BACKUP_ENDPOINT }}
          APPDEPLOY_BACKUP_TOKEN: ${{ secrets.APPDEPLOY_BACKUP_TOKEN }}
        run: node scripts/backup/backup-appdeploy.mjs
      - name: Store encrypted-at-rest workflow artifact
        if: ${{ hashFiles('backups/*.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: appdeploy-backup-${{ github.run_id }}
          path: backups/*.json
          retention-days: 30
          if-no-files-found: error

name: Monthly SEO and Lighthouse audit

on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  lighthouse:
    if: ${{ vars.PRODUCTION_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Audit production URL
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ vars.PRODUCTION_URL }}
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
      - name: Capture Lighthouse score baseline
        if: ${{ always() && hashFiles('.lighthouseci/*.json') != '' }}
        run: node scripts/reports/capture-lighthouse.mjs
      - name: Commit latest Lighthouse metrics
        if: ${{ always() && hashFiles('reports/metrics/lighthouse-latest.json') != '' }}
        run: |
          git config user.name "marsad-tisaa-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/metrics/lighthouse-latest.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore(metrics): update Lighthouse baseline"
          git push
      - name: Open issue when audit fails
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Lighthouse regression - ${new Date().toISOString().slice(0, 10)}`,
              body: `فشل تدقيق Lighthouse للرابط ${process.env.PRODUCTION_URL}. راجع تشغيل GitHub Actions والـartifact قبل الدمج أو النشر التالي.`
            });
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
